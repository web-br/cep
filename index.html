<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB BR - Consulta de CEP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Partículas de fundo */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Logo */
        .logo-container {
            position: relative;
            z-index: 1;
            margin-bottom: 40px;
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.3));
        }

        .logo-sub {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: -5px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Card principal */
        .main-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), transparent 40%, transparent 60%, rgba(123, 47, 247, 0.3));
            border-radius: 24px;
            z-index: -1;
            opacity: 0.5;
        }

        /* Input section */
        .input-section {
            margin-bottom: 30px;
        }

        .input-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }

        .cep-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 1.3rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s ease;
        }

        .cep-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        .cep-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .search-btn {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            border-radius: 16px;
            padding: 16px 24px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .search-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Resultado */
        .result-container {
            display: none;
            animation: slideUp 0.5s ease;
        }

        .result-container.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-icon svg {
            width: 20px;
            height: 20px;
            color: #fff;
        }

        .result-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .result-cep {
            color: #00d4ff;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .info-grid {
            display: grid;
            gap: 12px;
        }

        .info-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 14px 18px;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: rgba(0, 0, 0, 0.3);
            border-left-color: #00d4ff;
            transform: translateX(5px);
        }

        .info-label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .info-value {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Estado */
        .state-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 47, 247, 0.2));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #00d4ff;
        }

        /* Erro */
        .error-message {
            display: none;
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.3);
            border-radius: 12px;
            padding: 16px;
            color: #ff6b6b;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            margin-top: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .footer a {
            color: rgba(0, 212, 255, 0.6);
            text-decoration: none;
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .search-btn.loading .spinner {
            display: block;
        }

        .search-btn.loading .btn-text,
        .search-btn.loading svg {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Glow effect no input quando tem resultado */
        .main-card.has-result {
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 40px rgba(0, 212, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .logo {
                font-size: 3rem;
            }
            .main-card {
                padding: 25px;
            }
            .cep-input {
                font-size: 1.1rem;
                padding: 14px 16px;
            }
            .search-btn {
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fundo -->
    <div class="particles" id="particles"></div>

    <!-- Logo -->
    <div class="logo-container">
        <div class="logo">WEB BR</div>
        <div class="logo-sub">Consulta de CEP</div>
    </div>

    <!-- Card Principal -->
    <div class="main-card" id="mainCard">
        <div class="input-section">
            <label class="input-label">Digite o CEP</label>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="cep-input" 
                    id="cepInput" 
                    placeholder="00000-000" 
                    maxlength="9"
                    autocomplete="off"
                >
                <button class="search-btn" id="searchBtn" onclick="consultarCep()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                    </svg>
                    <span class="btn-text">Buscar</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <!-- Resultado -->
        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <div class="result-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                    </svg>
                </div>
                <div>
                    <div class="result-title">Endereço Encontrado</div>
                    <div class="result-cep" id="resultCep"></div>
                </div>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Logradouro</div>
                    <div class="info-value" id="infoStreet">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Bairro</div>
                    <div class="info-value" id="infoNeighborhood">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Cidade</div>
                    <div class="info-value" id="infoCity">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Estado</div>
                    <div class="info-value">
                        <span class="state-badge" id="infoState">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Erro -->
        <div class="error-message" id="errorMessage"></div>
    </div>

    <div class="footer">
        Desenvolvido com 💜 por WEB BR · API por <a href="https://api-web-br.github.io" target="_blank">api-web-br.github.io</a>
    </div>

    <script>
        // Criar partículas
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particle.style.width = (2 + Math.random() * 4) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Máscara de CEP
        const cepInput = document.getElementById('cepInput');
        cepInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 5) {
                value = value.substring(0, 5) + '-' + value.substring(5, 8);
            }
            e.target.value = value;
        });

        // Enter para buscar
        cepInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                consultarCep();
            }
        });

        async function consultarCep() {
            const cep = cepInput.value.replace(/\D/g, '');
            const btn = document.getElementById('searchBtn');
            const resultContainer = document.getElementById('resultContainer');
            const errorMessage = document.getElementById('errorMessage');
            const mainCard = document.getElementById('mainCard');

            // Reset
            resultContainer.classList.remove('show');
            errorMessage.classList.remove('show');
            mainCard.classList.remove('has-result');

            // Validação
            if (cep.length !== 8) {
                errorMessage.textContent = '⚠️ Digite um CEP válido com 8 dígitos';
                errorMessage.classList.add('show');
                return;
            }

            // Loading
            btn.classList.add('loading');

            try {
                const response = await fetch(`https://corsproxy.io/?https://api-web-br.vercel.app/api/cep.js?cep=${cep}`);

                if (!response.ok) {
                    throw new Error('CEP não encontrado');
                }

                const data = await response.json();

                // Verificar se tem erro na resposta
                if (data.error || !data.cep) {
                    throw new Error('CEP não encontrado');
                }

                // Preencher dados
                document.getElementById('resultCep').textContent = formatCep(data.cep);
                document.getElementById('infoStreet').textContent = data.street || 'Não informado';
                document.getElementById('infoNeighborhood').textContent = data.neighborhood || 'Não informado';
                document.getElementById('infoCity').textContent = data.city || 'Não informado';
                document.getElementById('infoState').textContent = data.state || '-';

                // Mostrar resultado
                resultContainer.classList.add('show');
                mainCard.classList.add('has-result');

            } catch (error) {
                errorMessage.textContent = '❌ CEP não encontrado. Verifique o número e tente novamente.';
                errorMessage.classList.add('show');
            } finally {
                btn.classList.remove('loading');
            }
        }

        function formatCep(cep) {
            return cep.replace(/(\d{5})(\d{3})/, '$1-$2');
        }
    </script>

</body>
</html>
